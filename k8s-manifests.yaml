---
apiVersion: v1
kind: Namespace
metadata:
  name: otel-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-demo-app-code
  namespace: otel-demo
data:
  app.py: |
    import time
    import random
    import logging
    from flask import Flask, jsonify
    from prometheus_client import Counter, Histogram, start_http_server

    from opentelemetry import trace

    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    logger = logging.getLogger(__name__)

    tracer = trace.get_tracer("otel-demo-app", "1.0.0")

    # Custom metrics via prometheus_client — starts HTTP server on 0.0.0.0:8888
    request_counter = Counter(
        "app_requests_total",
        "Total number of app requests by endpoint",
        ["endpoint", "method", "status"],
    )
    latency_histogram = Histogram(
        "app_request_duration_ms",
        "App request latency in milliseconds",
        ["endpoint", "method"],
        buckets=[5, 10, 25, 50, 100, 250, 500, 1000, 2500],
    )
    order_counter = Counter(
        "app_orders_created",
        "Total orders created",
        ["region"],
    )

    start_http_server(8888, addr="0.0.0.0")

    app = Flask(__name__)

    @app.route("/")
    def index():
        return jsonify({"status": "healthy", "service": "otel-demo-app"})

    @app.route("/api/orders", methods=["GET"])
    def get_orders():
        with tracer.start_as_current_span("get_orders") as span:
            with tracer.start_as_current_span("db_query"):
                latency = random.uniform(5, 50)
                time.sleep(latency / 1000)
                span.set_attribute("db.system", "postgresql")
                span.set_attribute("db.statement", "SELECT * FROM orders LIMIT 10")
            with tracer.start_as_current_span("process_results"):
                time.sleep(random.uniform(1, 10) / 1000)
                order_count = random.randint(1, 10)
                span.set_attribute("app.order_count", order_count)
            total_latency = latency + random.uniform(1, 10)
            request_counter.labels(endpoint="/api/orders", method="GET", status="200").inc()
            latency_histogram.labels(endpoint="/api/orders", method="GET").observe(total_latency)
            logger.info("Fetched %d orders in %.1fms", order_count, total_latency)
        orders = [{"id": i, "item": "item-{}".format(i), "price": round(random.uniform(10, 100), 2)} for i in range(order_count)]
        return jsonify({"orders": orders, "count": order_count})

    @app.route("/api/orders", methods=["POST"])
    def create_order():
        with tracer.start_as_current_span("create_order") as span:
            with tracer.start_as_current_span("validate_order"):
                time.sleep(random.uniform(2, 8) / 1000)
            with tracer.start_as_current_span("db_insert"):
                latency = random.uniform(10, 80)
                time.sleep(latency / 1000)
                span.set_attribute("db.system", "postgresql")
            if random.random() < 0.1:
                span.set_attribute("error", True)
                request_counter.labels(endpoint="/api/orders", method="POST", status="500").inc()
                latency_histogram.labels(endpoint="/api/orders", method="POST").observe(latency)
                logger.error("Failed to create order - database timeout")
                return jsonify({"error": "Internal server error"}), 500
            request_counter.labels(endpoint="/api/orders", method="POST", status="201").inc()
            latency_histogram.labels(endpoint="/api/orders", method="POST").observe(latency)
            order_counter.labels(region="us-east-1").inc()
            logger.info("Order created in %.1fms", latency)
        return jsonify({"id": random.randint(1000, 9999), "status": "created"}), 201

    @app.route("/api/slow")
    def slow_endpoint():
        with tracer.start_as_current_span("slow_operation") as span:
            delay = random.uniform(200, 2000)
            span.set_attribute("delay_ms", delay)
            time.sleep(delay / 1000)
            request_counter.labels(endpoint="/api/slow", method="GET", status="200").inc()
            latency_histogram.labels(endpoint="/api/slow", method="GET").observe(delay)
        return jsonify({"message": "done", "delay_ms": round(delay, 1)})

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=8080)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-app
  namespace: otel-demo
  labels:
    app: otel-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-demo-app
  template:
    metadata:
      labels:
        app: otel-demo-app
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: otel-demo-app
        image: public.ecr.aws/docker/library/python:3.12-slim
        command: ["/bin/sh", "-c"]
        args:
        - "pip install --no-cache-dir flask==3.1.0 prometheus-client && python /app/app.py"
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8888
          name: metrics
        env:
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=otel-demo-app,service.version=1.0.0,deployment.environment=dev"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 15
        volumeMounts:
        - name: app-code
          mountPath: /app
      volumes:
      - name: app-code
        configMap:
          name: otel-demo-app-code
---
apiVersion: v1
kind: Service
metadata:
  name: otel-demo-app
  namespace: otel-demo
  labels:
    app: otel-demo-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: otel-demo-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: otel-demo
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: load-gen
        image: public.ecr.aws/docker/library/busybox:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting 90s for app to start..."
          sleep 90
          echo "Starting load generator..."
          while true; do
            wget -q -O /dev/null http://otel-demo-app.otel-demo.svc.cluster.local/api/orders 2>/dev/null
            sleep 2
            wget -q -O /dev/null --post-data='{"item":"test"}' http://otel-demo-app.otel-demo.svc.cluster.local/api/orders 2>/dev/null
            sleep 3
            if [ $((RANDOM % 5)) -eq 0 ]; then
              wget -q -O /dev/null http://otel-demo-app.otel-demo.svc.cluster.local/api/slow 2>/dev/null
            fi
            sleep 2
          done
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
