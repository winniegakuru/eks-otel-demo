AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon EKS Cluster with Managed Node Group and dedicated VPC

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
    - Label:
        default: EKS Cluster Configuration
      Parameters:
      - ClusterName
      - KubernetesVersion
      - NodeInstanceType
      - NodeGroupMinSize
      - NodeGroupMaxSize
      - NodeGroupDesiredSize
    - Label:
        default: Worker Network Configuration
      Parameters:
      - VpcBlock
      - PublicSubnet01Block
      - PublicSubnet02Block
      - PrivateSubnet01Block
      - PrivateSubnet02Block

Parameters:
  ClusterName:
    Default: eks-otel-new-cluster
    Description: Name of the EKS cluster
    Type: String
  KubernetesVersion:
    Default: '1.35'
    Description: Kubernetes version to use for the EKS cluster
    Type: String
  NodeInstanceType:
    Default: m5.large
    Description: EC2 instance type for the managed node group
    Type: String
  NodeGroupMinSize:
    Default: 2
    Description: Minimum number of nodes in the managed node group
    Type: Number
  NodeGroupMaxSize:
    Default: 4
    Description: Maximum number of nodes in the managed node group
    Type: Number
  NodeGroupDesiredSize:
    Default: 2
    Description: Desired number of nodes in the managed node group
    Type: Number
  VpcBlock:
    Default: 192.168.0.0/16
    Description: The CIDR range for the VPC
    Type: String
  PublicSubnet01Block:
    Default: 192.168.0.0/18
    Description: CidrBlock for public subnet 01
    Type: String
  PublicSubnet02Block:
    Default: 192.168.64.0/18
    Description: CidrBlock for public subnet 02
    Type: String
  PrivateSubnet01Block:
    Default: 192.168.128.0/18
    Description: CidrBlock for private subnet 01
    Type: String
  PrivateSubnet02Block:
    Default: 192.168.192.0/18
    Description: CidrBlock for private subnet 02
    Type: String

Resources:
  # ---- VPC and Networking ----
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcBlock
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: Public Subnets
      - Key: Network
        Value: Public

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet01:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet01Block
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-PublicSubnet01'
      - Key: kubernetes.io/role/elb
        Value: '1'

  PublicSubnet02:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet02Block
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-PublicSubnet02'
      - Key: kubernetes.io/role/elb
        Value: '1'

  PublicSubnet01RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet01
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet02RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet02
      RouteTableId: !Ref PublicRouteTable

  NatGatewayEIP1:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGatewayEIP2:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway01:
    Type: AWS::EC2::NatGateway
    DependsOn:
    - NatGatewayEIP1
    - PublicSubnet01
    - VPCGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatGatewayEIP1.AllocationId
      SubnetId: !Ref PublicSubnet01
      Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-NatGatewayAZ1'

  NatGateway02:
    Type: AWS::EC2::NatGateway
    DependsOn:
    - NatGatewayEIP2
    - PublicSubnet02
    - VPCGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatGatewayEIP2.AllocationId
      SubnetId: !Ref PublicSubnet02
      Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-NatGatewayAZ2'

  PrivateRouteTable01:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: Private Subnet AZ1

  PrivateRouteTable02:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: Private Subnet AZ2

  PrivateRoute01:
    Type: AWS::EC2::Route
    DependsOn:
    - VPCGatewayAttachment
    - NatGateway01
    Properties:
      RouteTableId: !Ref PrivateRouteTable01
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway01

  PrivateRoute02:
    Type: AWS::EC2::Route
    DependsOn:
    - VPCGatewayAttachment
    - NatGateway02
    Properties:
      RouteTableId: !Ref PrivateRouteTable02
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway02

  PrivateSubnet01:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet01Block
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-PrivateSubnet01'
      - Key: kubernetes.io/role/internal-elb
        Value: '1'

  PrivateSubnet02:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet02Block
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-PrivateSubnet02'
      - Key: kubernetes.io/role/internal-elb
        Value: '1'

  PrivateSubnet01RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet01
      RouteTableId: !Ref PrivateRouteTable01

  PrivateSubnet02RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet02
      RouteTableId: !Ref PrivateRouteTable02

  # ---- Security Group ----
  ControlPlaneSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cluster communication with worker nodes
      VpcId: !Ref VPC

  # ---- IAM Roles ----
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: eks.amazonaws.com
          Action:
          - sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController

  NodeInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action:
          - sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
      - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  # ---- EKS Cluster (NO Auto Mode) ----
  EksCluster:
    Type: AWS::EKS::Cluster
    DependsOn:
    - EksClusterRole
    - PublicSubnet01
    - PublicSubnet02
    - PrivateSubnet01
    - PrivateSubnet02
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EksClusterRole.Arn
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
      ResourcesVpcConfig:
        EndpointPrivateAccess: true
        EndpointPublicAccess: true
        SecurityGroupIds:
        - !Ref ControlPlaneSecurityGroup
        SubnetIds:
        - !Ref PublicSubnet01
        - !Ref PublicSubnet02
        - !Ref PrivateSubnet01
        - !Ref PrivateSubnet02

  # ---- Managed Node Group ----
  EksNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn:
    - EksCluster
    Properties:
      ClusterName: !Ref ClusterName
      NodegroupName: !Sub '${ClusterName}-nodegroup'
      NodeRole: !GetAtt NodeInstanceRole.Arn
      InstanceTypes:
      - !Ref NodeInstanceType
      ScalingConfig:
        MinSize: !Ref NodeGroupMinSize
        MaxSize: !Ref NodeGroupMaxSize
        DesiredSize: !Ref NodeGroupDesiredSize
      Subnets:
      - !Ref PrivateSubnet01
      - !Ref PrivateSubnet02
      AmiType: AL2023_x86_64_STANDARD
      Tags:
        Environment: dev
        ManagedBy: CloudFormation

Outputs:
  ClusterArn:
    Description: The ARN of the EKS cluster
    Value: !GetAtt EksCluster.Arn
  ClusterEndpoint:
    Description: The endpoint for the EKS cluster
    Value: !GetAtt EksCluster.Endpoint
  ClusterName:
    Description: The name of the EKS cluster
    Value: !Ref EksCluster
  ClusterSecurityGroupId:
    Description: Security group for the cluster control plane
    Value: !GetAtt EksCluster.ClusterSecurityGroupId
  NodeInstanceRoleArn:
    Description: The node instance role ARN
    Value: !GetAtt NodeInstanceRole.Arn
  VpcId:
    Description: The VPC Id
    Value: !Ref VPC
  SubnetIds:
    Description: Subnets IDs in the VPC
    Value: !Join
    - ','
    - - !Ref PublicSubnet01
      - !Ref PublicSubnet02
      - !Ref PrivateSubnet01
      - !Ref PrivateSubnet02
